<svg width="100%" viewBox="0 0 680 900" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Online Appointment Booking System — UML Use Case Diagram</title>
  <desc>UML use case diagram showing Patient, Doctor, and Admin actors interacting
  with use cases inside the Online Appointment Booking System boundary.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="155" y="30" width="380" height="850" fill="none"
    stroke="#000" stroke-width="1.5" rx="4"/>
  <text font-family="sans-serif" font-size="13" font-weight="600"
    x="345" y="56" text-anchor="middle" dominant-baseline="central">
    Online Appointment Booking System
  </text>

  <ellipse cx="345" cy="110" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="110"
    text-anchor="middle" dominant-baseline="central">Register / Login</text>

  <ellipse cx="345" cy="190" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="190"
    text-anchor="middle" dominant-baseline="central">Search doctor</text>

  <ellipse cx="345" cy="270" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="270"
    text-anchor="middle" dominant-baseline="central">View available slots</text>

  <ellipse cx="345" cy="350" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="350"
    text-anchor="middle" dominant-baseline="central">Send reminder notification</text>

  <ellipse cx="345" cy="440" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="440"
    text-anchor="middle" dominant-baseline="central">Book appointment</text>

  <ellipse cx="345" cy="530" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="530"
    text-anchor="middle" dominant-baseline="central">Process payment</text>

  <ellipse cx="345" cy="620" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="620"
    text-anchor="middle" dominant-baseline="central">Cancel appointment</text>

  <ellipse cx="345" cy="710" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="710"
    text-anchor="middle" dominant-baseline="central">View appointment history</text>

  <ellipse cx="345" cy="800" rx="115" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="345" y="800"
    text-anchor="middle" dominant-baseline="central">Manage schedule</text>

  <line x1="345" y1="372" x2="345" y2="412" stroke="#000" stroke-width="1"
    stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#444"
    x="354" y="395" dominant-baseline="central">«extend»</text>

  <line x1="345" y1="462" x2="345" y2="502" stroke="#000" stroke-width="1"
    stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#444"
    x="354" y="485" dominant-baseline="central">«include»</text>

  <circle cx="68" cy="390" r="16" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="68" y1="406" x2="68" y2="450" stroke="#000" stroke-width="1.2"/>
  <line x1="44" y1="422" x2="92" y2="422" stroke="#000" stroke-width="1.2"/>
  <line x1="68" y1="450" x2="48" y2="476" stroke="#000" stroke-width="1.2"/>
  <line x1="68" y1="450" x2="88" y2="476" stroke="#000" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="13" font-weight="600"
    x="68" y="494" text-anchor="middle" dominant-baseline="central">Patient</text>

  <line x1="100" y1="405" x2="230" y2="110" stroke="#000" stroke-width="0.8"/>
  <line x1="100" y1="405" x2="230" y2="190" stroke="#000" stroke-width="0.8"/>
  <line x1="100" y1="405" x2="230" y2="270" stroke="#000" stroke-width="0.8"/>
  <line x1="100" y1="405" x2="230" y2="440" stroke="#000" stroke-width="0.8"/>
  <line x1="100" y1="405" x2="230" y2="620" stroke="#000" stroke-width="0.8"/>
  <line x1="100" y1="405" x2="230" y2="710" stroke="#000" stroke-width="0.8"/>

  <circle cx="612" cy="330" r="16" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="612" y1="346" x2="612" y2="390" stroke="#000" stroke-width="1.2"/>
  <line x1="588" y1="362" x2="636" y2="362" stroke="#000" stroke-width="1.2"/>
  <line x1="612" y1="390" x2="592" y2="416" stroke="#000" stroke-width="1.2"/>
  <line x1="612" y1="390" x2="632" y2="416" stroke="#000" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="13" font-weight="600"
    x="612" y="434" text-anchor="middle" dominant-baseline="central">Admin</text>

  <line x1="580" y1="360" x2="460" y2="350" stroke="#000" stroke-width="0.8"/>

  <circle cx="612" cy="720" r="16" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="612" y1="736" x2="612" y2="780" stroke="#000" stroke-width="1.2"/>
  <line x1="588" y1="752" x2="636" y2="752" stroke="#000" stroke-width="1.2"/>
  <line x1="612" y1="780" x2="592" y2="806" stroke="#000" stroke-width="1.2"/>
  <line x1="612" y1="780" x2="632" y2="806" stroke="#000" stroke-width="1.2"/>
  <text font-family="sans-serif" font-weight="600" font-size="13" 
    x="612" y="824" text-anchor="middle" dominant-baseline="central">Doctor</text>

  <line x1="580" y1="750" x2="460" y2="710" stroke="#000" stroke-width="0.8"/>
  <line x1="580" y1="750" x2="460" y2="800" stroke="#000" stroke-width="0.8"/>
</svg>
