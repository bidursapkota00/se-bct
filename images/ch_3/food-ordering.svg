<svg width="100%" viewBox="0 0 840 960" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Online Food Ordering System — UML Use Case Diagram</title>
  <desc>UML use case diagram showing Customer, Delivery Personnel, and Restaurant Admin actors interacting with use cases inside the Online Food Ordering System boundary.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- System boundary -->
  <rect x="160" y="30" width="520" height="900" fill="none" stroke="#000" stroke-width="1.5" rx="4"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" x="420" y="58" text-anchor="middle" dominant-baseline="central">Online Food Ordering System</text>

  <!-- USE CASES: 11 items, y from 105 to 875, step=77 -->

  <ellipse cx="420" cy="120" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="120" text-anchor="middle" dominant-baseline="central">Browse menu</text>

  <ellipse cx="420" cy="197" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="197" text-anchor="middle" dominant-baseline="central">Search items</text>

  <ellipse cx="420" cy="274" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="274" text-anchor="middle" dominant-baseline="central">Add to cart</text>

  <ellipse cx="420" cy="351" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="351" text-anchor="middle" dominant-baseline="central">Place order</text>

  <ellipse cx="420" cy="428" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="428" text-anchor="middle" dominant-baseline="central">Make payment</text>

  <ellipse cx="420" cy="505" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="505" text-anchor="middle" dominant-baseline="central">Apply coupon</text>

  <ellipse cx="420" cy="582" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="582" text-anchor="middle" dominant-baseline="central">Track order</text>

  <ellipse cx="420" cy="659" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="659" text-anchor="middle" dominant-baseline="central">Rate / review</text>

  <ellipse cx="420" cy="736" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="736" text-anchor="middle" dominant-baseline="central">Manage menu</text>

  <ellipse cx="420" cy="813" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="813" text-anchor="middle" dominant-baseline="central">Update order status</text>

  <ellipse cx="420" cy="890" rx="110" ry="22" fill="none" stroke="#000" stroke-width="1"/>
  <text font-family="sans-serif" font-size="13" x="420" y="890" text-anchor="middle" dominant-baseline="central">Assign delivery</text>

  <!-- «include»: Place order → Make payment -->
  <line x1="420" y1="373" x2="420" y2="406" stroke="#000" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#444" x="428" y="391" dominant-baseline="central">«include»</text>

  <!-- «extend»: Apply coupon extends Place order
       Arrow FROM Apply coupon TO Place order (extend points to base use case) -->
  <path d="M530 505 Q608 428 530 351" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <!-- Label placed near midpoint of curve, pulled left to sit on the arrow -->
  <text font-family="sans-serif" font-size="11" fill="#444" x="600" y="428" text-anchor="middle" dominant-baseline="central">«extend»</text>

  <!-- ACTOR: Customer (left) centered around mid of UC1–UC8 ≈ y=390 -->
  <circle cx="74" cy="355" r="16" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="74" y1="371" x2="74" y2="415" stroke="#000" stroke-width="1.2"/>
  <line x1="50" y1="387" x2="98" y2="387" stroke="#000" stroke-width="1.2"/>
  <line x1="74" y1="415" x2="54" y2="441" stroke="#000" stroke-width="1.2"/>
  <line x1="74" y1="415" x2="94" y2="441" stroke="#000" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="13" font-weight="600" x="74" y="458" text-anchor="middle" dominant-baseline="central">Customer</text>

  <line x1="110" y1="370" x2="310" y2="120" stroke="#000" stroke-width="0.8"/>
  <line x1="110" y1="370" x2="310" y2="197" stroke="#000" stroke-width="0.8"/>
  <line x1="110" y1="370" x2="310" y2="274" stroke="#000" stroke-width="0.8"/>
  <line x1="110" y1="370" x2="310" y2="351" stroke="#000" stroke-width="0.8"/>
  <line x1="110" y1="370" x2="310" y2="582" stroke="#000" stroke-width="0.8"/>
  <line x1="110" y1="370" x2="310" y2="659" stroke="#000" stroke-width="0.8"/>

  <!-- ACTOR: Delivery Personnel (right) centered around UC7,UC10,UC11 ≈ y=690 -->
  <circle cx="766" cy="690" r="16" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="766" y1="706" x2="766" y2="750" stroke="#000" stroke-width="1.2"/>
  <line x1="742" y1="722" x2="790" y2="722" stroke="#000" stroke-width="1.2"/>
  <line x1="766" y1="750" x2="746" y2="776" stroke="#000" stroke-width="1.2"/>
  <line x1="766" y1="750" x2="786" y2="776" stroke="#000" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="13" font-weight="600" x="766" y="793" text-anchor="middle" dominant-baseline="central">Delivery</text>
  <text font-family="sans-serif" font-size="13" font-weight="600" x="766" y="811" text-anchor="middle" dominant-baseline="central">Personnel</text>

  <line x1="730" y1="708" x2="530" y2="582" stroke="#000" stroke-width="0.8"/>
  <line x1="730" y1="708" x2="530" y2="813" stroke="#000" stroke-width="0.8"/>

  <!-- ACTOR: Restaurant Admin (right) centered around UC9,UC10,UC11 ≈ y=500 -->
  <circle cx="766" cy="490" r="16" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="766" y1="506" x2="766" y2="550" stroke="#000" stroke-width="1.2"/>
  <line x1="742" y1="522" x2="790" y2="522" stroke="#000" stroke-width="1.2"/>
  <line x1="766" y1="550" x2="746" y2="576" stroke="#000" stroke-width="1.2"/>
  <line x1="766" y1="550" x2="786" y2="576" stroke="#000" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="13" font-weight="600" x="766" y="593" text-anchor="middle" dominant-baseline="central">Restaurant</text>
  <text font-family="sans-serif" font-size="13" font-weight="600" x="766" y="611" text-anchor="middle" dominant-baseline="central">Admin</text>

  <line x1="730" y1="510" x2="530" y2="736" stroke="#000" stroke-width="0.8"/>
  <line x1="730" y1="510" x2="530" y2="813" stroke="#000" stroke-width="0.8"/>
  <line x1="730" y1="510" x2="530" y2="890" stroke="#000" stroke-width="0.8"/>
</svg>